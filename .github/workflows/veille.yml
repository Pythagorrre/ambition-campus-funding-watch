name: Veille hebdomadaire

on:
  schedule:
    # Tous les lundis à 05h00 UTC (06h/07h heure de Paris)
    - cron: "0 5 * * 1"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: veille
  cancel-in-progress: false

jobs:
  veille:
    # Sur un push (modif de sources, de scripts…), on ne relance pas le scraping,
    # on redéploie seulement le dashboard existant.
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lancer la veille
        run: python3 scripts/funding_watch.py --mark-seen --min-score 18 --max-detail 250

      - name: Découverte de nouvelles sources (non bloquant)
        run: python3 scripts/discover_sources.py || echo "Découverte en échec — on continue."

      - name: Générer le dashboard
        run: python3 scripts/build_dashboard.py

      - name: Publier les résultats
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@users.noreply.github.com"
          git add outputs/ dashboard/ data/ config/
          if git diff --cached --quiet; then
            echo "Aucun changement à publier."
          else
            git commit -m "Veille du $(date -u +%Y-%m-%d)"
            git push
          fi

  deploy:
    needs: veille
    if: always() && !cancelled() && (needs.veille.result == 'success' || needs.veille.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      # Le backend Pages échoue parfois avec un « Deployment failed, try again
      # later » transitoire : on retente jusqu'à 3 fois espacées de 4 minutes.
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - if: steps.deploy1.outcome == 'failure'
        run: sleep 240
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 240
      - id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4

name: Veille hebdomadaire

on:
  schedule:
    # Tous les lundis à 05h00 UTC (06h/07h heure de Paris)
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lancer la veille
        run: python3 scripts/funding_watch.py --mark-seen --min-score 18 --max-detail 250

      - name: Générer le dashboard
        run: |
          python3 scripts/build_dashboard.py
          mkdir -p docs
          cp dashboard/index.html docs/index.html

      - name: Publier les résultats
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@users.noreply.github.com"
          git add outputs/ dashboard/ docs/ data/
          if git diff --cached --quiet; then
            echo "Aucun changement à publier."
          else
            git commit -m "Veille du $(date -u +%Y-%m-%d)"
            git push
          fi

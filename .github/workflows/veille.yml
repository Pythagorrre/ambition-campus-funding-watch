name: Veille hebdomadaire

on:
  schedule:
    # Tous les lundis à 05h00 UTC (06h/07h heure de Paris)
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: veille
  cancel-in-progress: false

jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lancer la veille
        run: python3 scripts/funding_watch.py --mark-seen --min-score 18 --max-detail 250

      - name: Découverte de nouvelles sources (non bloquant)
        run: python3 scripts/discover_sources.py || echo "Découverte en échec — on continue."

      - name: Générer le dashboard
        run: python3 scripts/build_dashboard.py

      # Pousse les opportunités ouvertes vers le site (table aap).
      # No-op tant que les secrets SITE_URL / SITE_SYNC_TOKEN ne sont pas définis.
      - name: Pousser vers le site (non bloquant)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          SITE_SYNC_TOKEN: ${{ secrets.SITE_SYNC_TOKEN }}
        run: python3 scripts/push_to_site.py

      # Le push déclenche automatiquement le redéploiement sur Cloudflare Pages
      # (qui héberge le dashboard, protégé par mot de passe).
      - name: Publier les résultats
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@users.noreply.github.com"
          git add outputs/ dashboard/ data/ config/
          if git diff --cached --quiet; then
            echo "Aucun changement à publier."
          else
            git commit -m "Veille du $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main
            git push
          fi

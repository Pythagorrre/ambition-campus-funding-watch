name: Newsletter hebdomadaire

on:
  schedule:
    # Vendredi 17h00 UTC = 19h00 Paris en été (18h00 en hiver — cron UTC fixe)
    - cron: "0 17 * * 5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  newsletter:
    runs-on: ubuntu-latest
    env:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Scraping frais juste avant l'envoi : la newsletter et le dashboard
      # reflètent les mêmes données à jour du vendredi (évite la désynchro
      # avec le run du lundi).
      - name: Lancer la veille
        run: python3 scripts/funding_watch.py --mark-seen --min-score 18 --max-detail 250

      - name: Découverte de nouvelles sources (non bloquant)
        run: python3 scripts/discover_sources.py || echo "Découverte en échec — on continue."

      - name: Générer le dashboard
        run: python3 scripts/build_dashboard.py

      - id: build
        name: Générer la newsletter (nouveautés des 7 derniers jours)
        run: python3 scripts/build_newsletter.py --days 7

      - name: Publier veille, dashboard et newsletter
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@users.noreply.github.com"
          git add outputs/ dashboard/ data/ config/
          if git diff --cached --quiet; then
            echo "Aucun changement à publier."
          else
            git commit -m "Veille + newsletter du $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main
            git push
          fi

      - name: Envoyer par mail
        if: env.SMTP_USERNAME != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ steps.build.outputs.subject }}
          to: ${{ secrets.MAIL_TO }}
          from: Veille Ambition Campus <${{ secrets.MAIL_FROM }}>
          html_body: file://${{ steps.build.outputs.html_path }}

      - name: SMTP non configuré
        if: env.SMTP_USERNAME == ''
        run: echo "Secrets SMTP absents — newsletter générée et archivée dans outputs/newsletters/, mais non envoyée. Voir le README pour configurer l'envoi."
